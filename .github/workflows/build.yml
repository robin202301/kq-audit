name: Build Windows App
on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0.0）时触发打包

jobs:
  release:
    runs-on: windows-latest # 关键：在 GitHub 提供的原生 Windows 环境中运行

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 确保与你本地开发版本一致
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          # 显式重建 sqlite3 模块，避免打包时报错
          ./node_modules/.bin/electron-rebuild -f -w sqlite3

      - name: Build Frontend
        run: npm run build # 编译 Vue/React 代码

      - name: Build Electron App
        run: npm run dist # 现在这个命令包含了构建和打包
        env:
          # 这行是关键：将 GitHub 自动生成的令牌传给环境变量 GH_TOKEN
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audit-System-Windows
          path: release/*.exe # 对应 package.json 中的 output 目录
